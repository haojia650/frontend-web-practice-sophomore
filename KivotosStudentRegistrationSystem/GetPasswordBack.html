<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找回密码</title>
  <link href="1.css" type="text/css" rel="stylesheet">
</head>
<body>
<div class="password-recovery">
  <div class="title">
    找回密码 <span class="subtitle">(通过邮箱获取密码)</span>
  </div>
  <div class="form-group">
    <div class="form-row name">
      <input type="text" placeholder="请输入您的姓名" required>
    </div>
  </div>
  <div class="form-group">
    <div class="form-row email">
      <input type="email" placeholder="请输入邮箱地址" required>
    </div>
  </div>
  <div class="form-group captcha">
    <input type="text" placeholder="请输入验证码" required>
    <span><img src="4ad27d9d313aeef7dd360b2513be5999.png"></span> <!-- 这里实际开发中应替换为动态生成的验证码图片 -->
  </div>
  <button class="btn">发送邮件</button>
</div>
</body>
</html>
